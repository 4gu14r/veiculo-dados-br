services:
  db:
    image: postgres:16-alpine
    container_name: veiculos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-veiculos}
      POSTGRES_USER:     ${POSTGRES_USER:-veiculos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veiculos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veiculos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: veiculos_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"

volumes:
  pgdata:
