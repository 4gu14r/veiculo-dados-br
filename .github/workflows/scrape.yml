name: Scraper semanal

on:
  schedule:
    # Toda segunda-feira às 03:00 UTC (00:00 horário de Brasília)
    - cron: "0 3 * * 1"
  workflow_dispatch:
    # Permite disparar manualmente pelo GitHub Actions

jobs:
  sync:
    name: Sync de novos veículos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar scraper incremental
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.sync
