$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/marcas?q=string&limite=100&pagina=1"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: q
      value: string
      description: Filtrar por nome (parcial, case-insensitive)
    - key: limite
      value: "100"
      description: Itens por página
    - key: pagina
      value: "1"
      description: Número da página
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      [
        {
          "id": 8141,
          "nome": "string"
        },
        {
          "id": 3410,
          "nome": "string"
        }
      ]
order: 1000
