$kind: http-request
description: Retorna todas as marcas cadastradas. Suporta filtro por nome.
url: "{{baseUrl}}/api/v1/marcas?q=string&limite=100&pagina=1"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: q
    value: string
    description: Filtrar por nome (parcial, case-insensitive)
  - key: limite
    value: "100"
    description: Itens por página
  - key: pagina
    value: "1"
    description: Número da página
examples: ./.resources/Listar marcas.resources/examples
order: 2000
