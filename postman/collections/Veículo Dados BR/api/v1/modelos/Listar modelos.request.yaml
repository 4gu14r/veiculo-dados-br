$kind: http-request
description: Retorna todos os modelos. Filtre por nome ou por marca.
url: "{{baseUrl}}/api/v1/modelos?q=string&marca_id=3841&limite=100&pagina=1"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: q
    value: string
    description: Filtrar por nome (parcial, case-insensitive)
  - key: marca_id
    value: "3841"
    description: Filtrar por ID de marca
  - key: limite
    value: "100"
  - key: pagina
    value: "1"
examples: ./.resources/Listar modelos.resources/examples
order: 2000
